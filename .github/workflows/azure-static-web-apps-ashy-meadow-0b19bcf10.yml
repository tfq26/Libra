name: Azure Full Stack CI/CD (Single Job)

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

env:
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # This job handles both build and deploy for master pushes and open PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build Frontend
      - name: Install & Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build

      # Build Backend (Functions)
      - name: Install & Build Backend
        run: |
          cd Backend
          npm install
          npm run build --if-present
          npm test --if-present
      
      # Login to Azure AFTER building, right before deployment
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy the Static Web App and API together from the original source structure
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MEADOW_0B19BCF10 }}
          action: "upload"
          # Point to the pre-built assets and skip the action's build
          app_location: "Frontend/dist" # Point to the build output
          api_location: "Backend"        # Point to the API folder
          skip_app_build: true
          skip_api_build: true

  # This job closes the PR preview environment
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MEADOW_0B19BCF10 }}
          action: "close"

