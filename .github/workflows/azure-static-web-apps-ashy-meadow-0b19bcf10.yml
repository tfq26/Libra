name: Azure Full Stack CI/CD (Single Job)

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

env:
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # This job handles both build and deploy for master pushes and open PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build Frontend
      - name: Install & Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build

      # Build Backend (Functions)
      - name: Install & Build Backend
        run: |
          cd Backend
          npm install
          npm run build --if-present
          npm test --if-present
      
      # Login to Azure AFTER building, right before deployment
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # NEW: This step safely prints parts of your secrets for verification
      - name: Verify Secrets
        run: |
          echo "Verifying secrets..."
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          SUB_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          SWA_TOKEN="${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MEADOW_0B19BCF10 }}"
          
          echo "  - Client ID starts with: ${CLIENT_ID:0:5}..."
          echo "  - Subscription ID starts with: ${SUB_ID:0:5}..."
          echo "  - SWA Token starts with: ${SWA_TOKEN:0:5}..."
          echo "  - SWA Token ends with: ...${SWA_TOKEN: -5}"

      # Deploy the Static Web App and API together
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MEADOW_0B19BCF10 }}
          action: "upload"
          # Point to the pre-built assets and skip the action's build
          app_location: "Frontend/dist" # Point to the build output
          api_location: "Backend/api"    # CORRECTED: Point to the folder with your function files
          skip_app_build: true
          skip_api_build: true

  # This job closes the PR preview environment
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MEADOW_0B19BCF10 }}
          action: "close"
          app_location: "Frontend/dist"
          api_location: "Backend/api"

