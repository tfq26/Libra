name: Azure Full Stack CI/CD
name: Azure Full Stack CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

env:
  NODE_VERSION: '20' # Supported by Azure Functions and modern frontends

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build Frontend
      - name: Install & Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build

      # Build Backend (Functions)
      - name: Install & Build Backend
        run: |
          cd Backend
          npm install
          npm run build --if-present
          npm test --if-present

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fullstack-app
          path: |
            Frontend/dist
            Backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    needs: build
    permissions:
      id-token: write
      contents: read

      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fullstack-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
          name: fullstack-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D1B2E835F2444E888992DFECD3049F11 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_034B918A242E4429B43F013D7D26DE77 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89A21E232F9541538F9BE94D73B2BE25 }}

      # Deploy Frontend (Static Web App)
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}
          action: "upload"
          app_location: "Frontend"
          output_location: "dist"

      # Deploy Backend (Azure Function App)
      - name: Deploy Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: 'libra2app'
          slot-name: 'Production'
          package: Backend
          runtime: 'node'
          runtime-version: '20'

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close PR environment
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
