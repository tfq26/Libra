name: Azure Full Stack CI/CD (Single Job)

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

env:
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # This job handles both build and deploy for master pushes and open PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build Frontend
      - name: Install & Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build

      # Build Backend (Functions)
      - name: Install & Build Backend
        run: |
          cd Backend
          npm install
          npm run build --if-present
          npm test --if-present
      
      # Login to Azure AFTER building, right before deployment
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D1B2E835F2444E888992DFECD3049F11 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_034B918A242E4429B43F013D7D26DE77 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89A21E232F9541538F9BE94D73B2BE25 }}

      # Deploy the Static Web App and API together from the original source structure
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}
          action: "upload"
          # Now we point to the source folders since we haven't used artifacts
          app_location: "Frontend"
          output_location: "dist"
          api_location: "Backend"

  # The close job can remain separate as it doesn't need the build files
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}
          action: "close"
          app_location: "Frontend"
