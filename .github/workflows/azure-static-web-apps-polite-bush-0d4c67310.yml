name: Azure Full Stack CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build Frontend
      - name: Install & Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build

      # Build Backend (Functions)
      - name: Install & Build Backend
        run: |
          cd Backend
          npm install
          npm run build --if-present
          npm test --if-present

      # Upload artifacts for the deploy job
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fullstack-app
          path: |
            Frontend/dist
            Backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # This job should run for pushes to master and for open PRs, but not when a PR is closed.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fullstack-app
          path: .

      - name: Install Azure Functions Core Tools
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D1B2E835F2444E888992DFECD3049F11 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_034B918A242E4429B43F013D7D26DE77 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89A21E232F9541538F9BE94D73B2BE25 }}

      # This is a debugging step. You can remove it after confirming the secret is being read correctly.
      - name: Verify Deployment Token
        run: |
          SECRET_VALUE="${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}"
          if [ -z "$SECRET_VALUE" ]; then
            echo "❌ ERROR: The deployment token secret is not set or is empty."
            exit 1
          else
            echo "✅ Secret is present."
            echo "   - Secret Length: ${#SECRET_VALUE}"
            echo "   - First 4 chars: ${SECRET_VALUE:0:4}..."
            echo "   - Last 4 chars: ...${SECRET_VALUE: -4}"
          fi

      # Deploy Frontend (Static Web App)
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}
          action: "upload"
          app_location: "."
          # CRITICAL FIX: Explicitly tell the action where the API code is.
          api_location: "Backend"

      # Deploy Backend (Azure Function App) - This step is now redundant if you use the integrated API feature above.
      # You can deploy the API along with the SWA. However, if you are managing the Function App separately, you can keep it.
      - name: Deploy Azure Function App
        uses: Azure/functions-action@v1.5.3
        with:
          app-name: 'libra2app'
          package: 'Backend'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_BUSH_0D4C67310 }}
          action: "close"
          # This job doesn't have the source code, so app_location should be removed. The token is sufficient.

